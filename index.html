<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBI - AI Pocket Pet</title>
    <style>
        :root {
            --theme-color: #00f3ff;
            --bg-dark: #080810;
            --panel-bg: #111122;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.8s ease;
        }
        body.theme-happy {
            --theme-color: #39ff14;
        }
        body.theme-sad {
            --theme-color: #0066ff;
        }
        body.theme-thinking {
            --theme-color: #bd00ff;
        }
        .api-panel {
            background-color: var(--panel-bg);
            border: 1px solid #222244;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        .api-panel input {
            background: #05050a;
            border: 1px solid #333366;
            color: #00f3ff;
            padding: 8px;
            border-radius: 8px;
            width: 90%;
            text-align: center;
            font-size: 11px;
        }
        .robot-chassis {
            position: relative;
            background: linear-gradient(145deg, #1d1d2e, #0c0c14);
            border: 4px solid #2d2d44;
            border-radius: 40px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .screen {
            background-color: #020205;
            border: 3px solid #1c1c30;
            border-radius: 25px;
            width: 100%;
            height: 210px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
        }
        /* ---- NUEVOS OJOS EXPRESIVOS ---- */
        .eyes-container {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .eye {
            width: 52px;
            height: 72px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 30px var(--theme-color);
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .iris {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 30% 30%, var(--theme-color), #000033);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s;
        }
        .pupil {
            width: 14px;
            height: 14px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .highlight {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 6px;
            left: 8px;
        }

        /* Expresiones mediante clases */
        .eye.happy {
            transform: scaleX(1.2) scaleY(0.7);
            border-radius: 50% 50% 45% 45%;
        }
        .eye.sad {
            transform: scaleX(0.9) scaleY(1.3);
            border-radius: 45% 45% 50% 50%;
        }
        .eye.thinking {
            transform: scaleX(0.8) scaleY(1);
            border-radius: 40% 40% 50% 50%;
        }
        .eye.surprised {
            transform: scale(1.3);
            border-radius: 50%;
        }
        .eye.love {
            transform: scale(0.9) rotate(5deg);
            border-radius: 45% 45% 40% 40%;
            box-shadow: 0 0 30px #ff4d7a, 0 0 60px #ff4d7a;
        }
        .eye.playful {
            transform: scaleY(0.8) rotate(-5deg);
            border-radius: 40% 40% 50% 50%;
        }
        /* Fin nuevos ojos */
        .chat-container {
            background-color: rgba(0,0,0,0.4);
            border-radius: 15px;
            width: 100%;
            height: 110px;
            margin-top: 15px;
            padding: 10px;
            overflow-y: auto;
            font-size: 11px;
            border: 1px solid #1a1a2e;
        }
        .input-group {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-top: 15px;
        }
        .input-group input {
            flex: 1;
            background: #05050a;
            border: 1px solid #2d2d44;
            color: white;
            padding: 10px;
            border-radius: 20px;
        }
        .btn-action {
            background-color: var(--panel-bg);
            border: 1px solid #2d2d44;
            color: white;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="api-panel">
        <strong>⚙️ CREDENCIAL DE INTELIGENCIA</strong><br>
        <!-- API KEY YA PEGADA -->
        <input type="password" id="api-key" value="AQ.Ab8RN6IcrejmNXE9otvzXI-qbv8UWDO4v1CBrJHvUy41C29NYg">
    </div>
    <div class="robot-chassis">
        <div class="screen">
            <!-- DOS OJOS EXPRESIVOS -->
            <div class="eyes-container">
                <div class="eye" id="eye-left">
                    <div class="iris">
                        <div class="pupil"></div>
                        <div class="highlight"></div>
                    </div>
                </div>
                <div class="eye" id="eye-right">
                    <div class="iris">
                        <div class="pupil"></div>
                        <div class="highlight"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="text-input" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') sendPrompt()">
            <button class="btn-action" onclick="sendPrompt()">➤</button>
        </div>
    </div>
    <script>
        // Referencias a los ojos
        const eyeLeft = document.getElementById('eye-left');
        const eyeRight = document.getElementById('eye-right');

        // Función para cambiar la expresión de los ojos según emoción
        function setEyeEmotion(emotion) {
            // Quitar todas las clases de expresión anteriores
            eyeLeft.classList.remove('happy','sad','thinking','surprised','love','playful');
            eyeRight.classList.remove('happy','sad','thinking','surprised','love','playful');
            // Si la emoción está en nuestra lista, aplicarla
            if (['happy','sad','thinking','surprised','love','playful'].includes(emotion)) {
                eyeLeft.classList.add(emotion);
                eyeRight.classList.add(emotion);
            }
        }

        async function sendPrompt() {
            const question = document.getElementById('text-input').value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            const chatBox = document.getElementById('chat-box');

            if(!question || !apiKey) return;

            // Modelo original que usabas (gemini-3.5-flash)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: `Responde en JSON: {"emotion": "happy", "text": "Hola"}. Pregunta: ${question}` }] }]
                    })
                });

                const data = await response.json();
                if(!response.ok) throw new Error(data.error?.message || "Error del servidor");

                const rawText = data.candidates[0].content.parts[0].text;
                const parsed = JSON.parse(rawText.replace(/```json|```/g, ""));

                chatBox.innerHTML += `<div><strong>AIBI:</strong> ${parsed.text}</div>`;
                document.body.className = `theme-${parsed.emotion}`;
                
                // Aplicar expresión a los ojos
                setEyeEmotion(parsed.emotion);
            } catch (err) {
                chatBox.innerHTML += `<div style="color:red">Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
