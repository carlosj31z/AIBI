<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBI - AI Pocket Pet</title>
    <style>
        :root { 
            --theme-color: #00f3ff; 
            --bg-dark: #080810; 
            --panel-bg: #111122; 
            --border-glow: rgba(0, 243, 255, 0.3); 
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
            transition: background 0.8s ease; 
        }
        body.theme-happy { --theme-color: #39ff14; }
        body.theme-sad { --theme-color: #0066ff; }
        body.theme-thinking { --theme-color: #bd00ff; }
        
        .api-panel { 
            background-color: var(--panel-bg); 
            border: 1px solid #222244; 
            border-radius: 15px; 
            padding: 12px; 
            margin-bottom: 15px; 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }
        .api-panel input { 
            background: #05050a; 
            border: 1px solid #333366; 
            color: #00f3ff; 
            padding: 8px; 
            border-radius: 8px; 
            width: 90%; 
            text-align: center; 
            font-size: 11px; 
        }
        .robot-chassis { 
            position: relative; 
            background: linear-gradient(145deg, #1d1d2e, #0c0c14); 
            border: 4px solid #2d2d44; 
            border-radius: 40px; 
            padding: 25px; 
            width: 90%; 
            max-width: 380px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .screen { 
            background-color: #020205; 
            border: 3px solid #1c1c30; 
            border-radius: 25px; 
            width: 100%; 
            height: 210px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            overflow: hidden; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9); 
        }
        .eyes-container { 
            display: flex; 
            gap: 50px; 
            justify-content: center; 
            align-items: center; 
            height: 90px; 
        }
        .eye { 
            width: 52px; 
            height: 72px; 
            background-color: var(--theme-color); 
            border-radius: 50% 50% 45% 45%; 
            box-shadow: 0 0 30px var(--theme-color); 
            transition: all 0.2s;
        }
        .chat-container { 
            background-color: rgba(0,0,0,0.4); 
            border-radius: 15px; 
            width: 100%; 
            height: 110px; 
            margin-top: 15px; 
            padding: 10px; 
            overflow-y: auto; 
            font-size: 11px; 
            border: 1px solid #1a1a2e; 
            box-sizing: border-box;
        }
        .chat-line { margin-bottom: 5px; }
        .chat-line.user { color: #00f3ff; }
        .chat-line.ai { color: #39ff14; }
        .chat-line.system { color: #ff334b; font-family: monospace; }
        .input-group { 
            display: flex; 
            width: 100%; 
            gap: 8px; 
            margin-top: 15px; 
        }
        .input-group input { 
            flex: 1; 
            background: #05050a; 
            border: 1px solid #2d2d44; 
            color: white; 
            padding: 10px; 
            border-radius: 20px; 
        }
        .btn-action { 
            background-color: var(--panel-bg); 
            border: 1px solid #2d2d44; 
            color: white; 
            border-radius: 50%; 
            width: 38px; 
            height: 38px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="api-panel">
        <strong>⚙️ CREDENCIAL DE INTELIGENCIA</strong><br>
        <input type="password" id="api-key" placeholder="Pega aquí tu API Key (AQ... o AIzaSy...)">
    </div>

    <div class="robot-chassis">
        <div class="screen" id="screen">
            <div class="eyes-container">
                <div class="eye" id="eye-l"></div>
                <div class="eye" id="eye-r"></div>
            </div>
            <div id="status-text" style="color:var(--theme-color); font-family:monospace; font-size:10px;">STATUS: READY</div>
        </div>
        <div class="chat-container" id="chat-box">
            <div class="chat-line system">[SISTEMA]: Robot iniciado.</div>
        </div>
        <div class="input-group">
            <input type="text" id="text-input" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') sendPrompt()">
            <button class="btn-action" onclick="sendPrompt()">➤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const textInput = document.getElementById('text-input');
        const eyeL = document.getElementById('eye-l');
        const eyeR = document.getElementById('eye-r');
        const statusText = document.getElementById('status-text');

        function logChat(author, text, type = "") {
            const line = document.createElement('div');
            line.className = `chat-line ${type || (author === 'Tú' ? 'user' : 'ai')}`;
            line.innerHTML = `<strong>[${author.toUpperCase()}]:</strong> ${text}`;
            chatBox.appendChild(line);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setEmotion(e) {
            document.body.className = `theme-${e}`;
            statusText.innerText = `STATUS: ${e.toUpperCase()}`;
        }

        async function sendPrompt() {
            const question = textInput.value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            
            if(!question) return;
            if(!apiKey) {
                logChat("SISTEMA", "¡Falta la API Key!", "system");
                return;
            }

            textInput.value = '';
            logChat("Tú", question);
            setEmotion('thinking');

            try {
                // Endpoint estándar de Gemini 1.5 Flash
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;
                
                // Enviamos la API Key en la cabecera estándar de Google (compatible con AQ. y AIzaSy)
                const headers = { 
                    'Content-Type': 'application/json',
                    'x-goog-api-key': apiKey 
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        contents: [{ 
                            role: 'user', 
                            parts: [{ 
                                text: `Eres un robot mascota tierno. Responde obligatoriamente en formato JSON plano, sin usar bloques de código de markdown (no uses triple comilla ni la palabra json). Formato exacto: {"emotion": "happy|sad|thinking", "text": "tu respuesta simpática y corta"}. Pregunta: ${question}` 
                            }] 
                        }]
                    })
                });

                const data = await response.json();
                
                if(!response.ok) {
                    throw new Error(data.error?.message || "Error desconocido en el servidor de Google.");
                }

                const rawText = data.candidates[0].content.parts[0].text.trim();
                
                // Limpieza por si Gemini insiste en envolverlo en markdown ```json ... ```
                const cleanJsonText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                const parsed = JSON.parse(cleanJsonText);
                
                setEmotion(parsed.emotion || 'happy');
                logChat("AIBI", parsed.text || "¡Bip bup!");

            } catch (error) {
                logChat("SISTEMA", "Error: " + error.message, "system");
                setEmotion('sad');
            }
        }
    </script>
</body>
</html>
