<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AIBI - Dynamic Pet (Stable Version)</title>
    <style>
        :root { --eye-color: #00f3ff; --bg: #050505; --scale: 1; --rotate: 0; }
        body { margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .chassis { background: #0c0c0c; border: 3px solid #1a1a1a; border-radius: 40px; padding: 25px; width: 340px; }
        
        #screen { background: #000; border-radius: 25px; height: 180px; display: flex; align-items: center; justify-content: center; gap: 20px; cursor: pointer; position: relative; }
        
        /* Ojos con variables CSS para el movimiento constante */
        .eye { 
            width: 45px; height: 70px; background: var(--eye-color); border-radius: 20px; 
            transition: all 0.2s ease-out; 
            transform: scaleY(var(--scale)) rotate(var(--rotate));
        }
        .irritated { background: #ff0000 !important; transform: scaleY(0.2) !important; }
        
        .chat-box { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; height: 70px; overflow-y: auto; font-size: 11px; margin-bottom: 10px; color: #aaa; }
        
        .controls { display: flex; gap: 10px; align-items: center; }
        .mic-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .bar { width: 4px; height: 10px; background: #444; border-radius: 2px; }
        .active .bar { background: var(--eye-color); animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { height: 10px; } 50% { height: 25px; } }
        
        input { flex: 1; background: #111; border: 1px solid #222; color: white; padding: 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="chassis">
    <div id="screen" onmousemove="checkPetting(event)">
        <!-- Ojos controlados por variables CSS -->
        <div class="eye" id="eye-l" onclick="irritate('eye-l')" style="--scale: 1; --rotate: 0;"></div>
        <div class="eye" id="eye-r" onclick="irritate('eye-r')" style="--scale: 1; --rotate: 0;"></div>
    </div>
    
    <div class="chat-box" id="chat">...</div>

    <div class="controls">
        <button class="mic-btn" id="mic-btn" onclick="startVoice()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </button>
        <input type="text" id="input" placeholder="Dile algo...">
        <button onclick="send()" style="background:none; border:none; color:white; cursor:pointer">➤</button>
    </div>
</div>

<script>
    const API_KEY = "AQ.Ab8RN6IcrejmNXE9otvzXI-qbv8UWDO4v1CBrJHvUy41C29NYg";
    let baseScale = 1;

    // --- BUCLE DE "VIDA" (Movimiento constante) ---
    function animateLife() {
        const time = Date.now() * 0.003;
        // Micro-oscilación para simular respiración
        const breathing = Math.sin(time) * 0.05;
        
        document.querySelectorAll('.eye').forEach(eye => {
            // Aplicamos el movimiento sobre el estado actual
            eye.style.setProperty('--scale', baseScale + breathing);
        });
        requestAnimationFrame(animateLife);
    }
    animateLife();

    // --- LÓGICA DE EXPRESIONES ---
    function setExpression(color, scaleY, rotate) {
        baseScale = scaleY; // Actualizamos la base para el bucle de vida
        document.querySelectorAll('.eye').forEach(e => {
            e.style.backgroundColor = color;
            e.style.setProperty('--rotate', rotate);
        });
    }

    // --- IRRITABILIDAD INDIVIDUAL ---
    function irritate(id) {
        const eye = document.getElementById(id);
        eye.classList.add('irritated');
        setTimeout(() => eye.classList.remove('irritated'), 800);
    }

    // --- DETECTOR DE CARICIAS ---
    let moveCount = 0;
    function checkPetting() {
        moveCount++;
        if(moveCount > 40) {
            setExpression('#ff3399', 0.8, 0); // Rosa, achinado
            document.getElementById('chat').innerText = "*AIBI ronronea encantado*";
            moveCount = 0;
            setTimeout(() => setExpression('#00f3ff', 1, 0), 2000);
        }
    }

    // --- MICRÓFONO GEMINI ---
    async function startVoice() {
        const btn = document.getElementById('mic-btn');
        btn.classList.add('active');
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        rec.start();
        rec.onresult = (e) => {
            document.getElementById('input').value = e.results[0][0].transcript;
            btn.classList.remove('active');
            send();
        };
    }

    // --- IA PROCESAMIENTO ---
    async function send() {
        const txt = document.getElementById('input').value;
        if(!txt) return;
        document.getElementById('chat').innerText = "Tú: " + txt;
        
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'x-goog-api-key': API_KEY},
            body: JSON.stringify({contents: [{role: 'user', parts: [{text: `Responde JSON: {"color": "#hex", "scale": 0.0-1.5, "rotate": -45-45, "text": "..."}. Pregunta: ${txt}`}]}]})
        });
        
        const data = await res.json();
        const p = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
        
        setExpression(p.color, p.scale, p.rotate);
        document.getElementById('chat').innerText = "AIBI: " + p.text;
        
        const s = new SpeechSynthesisUtterance(p.text);
        s.pitch = 1.2;
        window.speechSynthesis.speak(s);
    }
</script>
</body>
</html>
