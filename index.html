<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AIBI - Premium Bot</title>
    <style>
        :root { --bg: #090912; --metal: #1a1a2e; --neon: #00f3ff; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        
        /* La caja metálica de AIBI */
        .chassis { width: 280px; height: 220px; background: var(--metal); border-radius: 30px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; }
        
        .eyes-container { display: flex; gap: 40px; }
        .eye { width: 50px; height: 60px; background: var(--neon); border-radius: 50%; transition: 0.5s; }
        
        /* Estados */
        .happy .eye { border-radius: 50% 50% 10% 10%; height: 30px; }
        .sad .eye { border-radius: 10px; height: 10px; }
        .thinking .eye { opacity: 0.5; transform: scale(0.7); }
        .petting .eye { background: #ff00ff; transform: scale(1.2); }

        .log { margin-top: 20px; width: 80%; max-width: 300px; height: 80px; font-size: 12px; color: #888; text-align: center; overflow-y: auto; }
        .input-area { margin-top: 20px; display: flex; gap: 10px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chassis" id="aibi" ontouchstart="petAibi()" onclick="petAibi()">
        <div class="eyes-container">
            <div class="eye" id="l"></div>
            <div class="eye" id="r"></div>
        </div>
    </div>

    <div class="log" id="transcript">AIBI está esperando...</div>

    <div class="input-area">
        <input type="text" id="text-input" placeholder="Escribe algo...">
        <button onclick="sendText()">Enviar</button>
        <button onclick="startVoice()">🎙️</button>
    </div>

    <script>
        const apiKey = "AQ.Ab8RN6IcrejmNXE9otvzXI-qbv8UWDO4v1CBrJHvUy41C29NYg";
        const aibi = document.getElementById('aibi');
        const transcript = document.getElementById('transcript');
        
        function setEmotion(e) { aibi.className = `chassis ${e}`; }

        // Caricias
        function petAibi() {
            setEmotion('petting');
            new SpeechSynthesisUtterance("¡Mmm, qué rico!").speak;
            setTimeout(() => setEmotion('happy'), 1000);
        }

        // Gemini Logic
        async function askGemini(text) {
            setEmotion('thinking');
            transcript.innerText = "Pensando...";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'x-goog-api-key': apiKey},
                body: JSON.stringify({ contents: [{ parts: [{ text: `JSON: {"emotion": "happy|sad|thinking", "text": "respuesta"}. Usuario: ${text}` }] }] })
            });
            const data = await res.json();
            const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
            
            transcript.innerText = json.text;
            setEmotion(json.emotion);
            const msg = new SpeechSynthesisUtterance(json.text);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function sendText() {
            const val = document.getElementById('text-input').value;
            askGemini(val);
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                transcript.innerText = "Tú: " + text;
                askGemini(text);
            };
            rec.start();
        }
    </script>
</body>
</html>
