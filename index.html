<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AIBI - Mascota Robot +100 expresiones</title>
    <style>
        :root {
            --theme-color: #00f3ff;
            --bg-dark: #080810;
            --panel-bg: #111122;
            --eye-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.8s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body.theme-happy { --theme-color: #39ff14; }
        body.theme-sad { --theme-color: #0066ff; }
        body.theme-thinking { --theme-color: #bd00ff; }
        body.theme-love { --theme-color: #ff4d7a; }
        body.theme-surprised { --theme-color: #ffaa00; }
        body.theme-playful { --theme-color: #ff66cc; }
        body.theme-sleepy { --theme-color: #aaaacc; }
        body.theme-excited { --theme-color: #ffd700; }
        body.theme-grateful { --theme-color: #88ff88; }
        body.theme-shy { --theme-color: #ffb6c1; }
        body.theme-angry { --theme-color: #ff3333; }
        body.theme-silly { --theme-color: #ff9900; }

        .api-panel {
            background-color: var(--panel-bg);
            border: 1px solid #222244;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            display: none; /* Oculto, la API KEY ya está pegada */
        }
        .api-panel input {
            background: #05050a;
            border: 1px solid #333366;
            color: #00f3ff;
            padding: 8px;
            border-radius: 8px;
            width: 90%;
            text-align: center;
            font-size: 11px;
        }
        .robot-chassis {
            position: relative;
            background: linear-gradient(145deg, #1d1d2e, #0c0c14);
            border: 4px solid #2d2d44;
            border-radius: 40px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 40px rgba(0,243,255,0.2), inset 0 0 30px rgba(0,0,0,0.6);
        }
        .screen {
            background-color: #020205;
            border: 3px solid #1c1c30;
            border-radius: 25px;
            width: 100%;
            height: 210px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 15px 0;
            position: relative;
            overflow: hidden;
        }
        .eye-container {
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        .eye {
            width: 52px;
            height: 72px;
            background-color: var(--eye-bg);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--theme-color), inset 0 0 10px rgba(0,0,0,0.3);
            position: relative;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .iris {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 30% 30%, var(--theme-color), #000033);
            border-radius: 50%;
            position: absolute;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pupil {
            width: 14px;
            height: 14px;
            background: #000;
            border-radius: 50%;
            position: absolute;
        }
        .highlight {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 6px;
            left: 8px;
        }
        .eyebrow {
            position: absolute;
            width: 54px;
            height: 4px;
            background: #ddd;
            border-radius: 4px;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.2s;
        }
        /* Partículas (corazones, lágrimas) */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            font-size: 18px;
            animation: floatUp 1.5s forwards;
            opacity: 0.9;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.5); }
        }
        .tear {
            position: absolute;
            width: 4px;
            height: 8px;
            background: #aaddff;
            border-radius: 0 0 50% 50%;
            animation: fallDown 1.2s forwards;
        }
        @keyframes fallDown {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(30px); }
        }
        .chat-container {
            background-color: rgba(0,0,0,0.4);
            border-radius: 15px;
            width: 100%;
            height: 110px;
            margin-top: 15px;
            padding: 10px;
            overflow-y: auto;
            font-size: 11px;
            border: 1px solid #1a1a2e;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chat-msg {
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-top: 15px;
            align-items: center;
        }
        .input-group input {
            flex: 1;
            background: #05050a;
            border: 1px solid #2d2d44;
            color: white;
            padding: 10px;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: border 0.3s;
        }
        .input-group input:focus {
            border-color: var(--theme-color);
        }
        .btn-action {
            background-color: var(--panel-bg);
            border: 1px solid #2d2d44;
            color: white;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-action:active {
            transform: scale(0.9);
            background: #2a2a50;
        }
        .btn-mic {
            background: #ff4080;
            border-color: #ff80b0;
        }
        .btn-mic.listening {
            animation: pulse 0.8s infinite;
            background: #ff1744;
            box-shadow: 0 0 30px red;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .speaking-indicator {
            display: none;
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
            text-align: center;
        }
        .speaking-indicator.active {
            display: block;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Panel de API oculto (ya contiene la key pegada) -->
    <div class="api-panel" style="display:none;">
        <strong>⚙️ CREDENCIAL DE INTELIGENCIA</strong><br>
        <input type="password" id="api-key" value="AQ.Ab8RN6IcrejmNXE9otvzXI-qbv8UWDO4v1CBrJHvUy41C29NYg">
    </div>

    <div class="robot-chassis" id="robot-chassis">
        <div class="screen" id="screen">
            <div class="eye-container">
                <!-- Ojo izquierdo -->
                <div class="eye" id="eye-left">
                    <div class="eyebrow" id="eyebrow-left"></div>
                    <div class="iris" id="iris-left">
                        <div class="pupil"></div>
                        <div class="highlight"></div>
                    </div>
                </div>
                <!-- Ojo derecho -->
                <div class="eye" id="eye-right">
                    <div class="eyebrow" id="eyebrow-right"></div>
                    <div class="iris" id="iris-right">
                        <div class="pupil"></div>
                        <div class="highlight"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="text-input" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') sendPrompt()">
            <button class="btn-action" id="send-btn" onclick="sendPrompt()">➤</button>
            <button class="btn-action btn-mic" id="mic-btn" title="Hablar">🎤</button>
        </div>
        <div class="speaking-indicator" id="speaking-indicator">AIBI está hablando...</div>
    </div>

    <script>
        (function() {
            // API Key ya puesta
            const API_KEY = "AQ.Ab8RN6IcrejmNXE9otvzXI-qbv8UWDO4v1CBrJHvUy41C29NYg";
            const MODEL = "gemini-1.5-flash";
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`;

            // Elementos
            const eyeLeft = document.getElementById('eye-left');
            const eyeRight = document.getElementById('eye-right');
            const irisLeft = document.getElementById('iris-left');
            const irisRight = document.getElementById('iris-right');
            const eyebrowLeft = document.getElementById('eyebrow-left');
            const eyebrowRight = document.getElementById('eyebrow-right');
            const screen = document.getElementById('screen');
            const chatBox = document.getElementById('chat-box');
            const textInput = document.getElementById('text-input');
            const micBtn = document.getElementById('mic-btn');
            const speakingIndicator = document.getElementById('speaking-indicator');

            // Estado de emoción actual
            let currentEmotion = 'neutral';

            // Mapeo de emociones a configuraciones de ojos/cejas (base)
            const emotionPresets = {
                neutral: {
                    eyeScaleX: 1, eyeScaleY: 1, irisSize: 32, irisOffsetX: 0, irisOffsetY: 0,
                    eyebrowAngle: 0, eyebrowY: -12, mouth: '', blush: 0, tear: 0, sparkle: 0, heart: false
                },
                happy: {
                    eyeScaleX: 1.1, eyeScaleY: 0.7, irisSize: 28, irisOffsetX: 0, irisOffsetY: -2,
                    eyebrowAngle: -15, eyebrowY: -14, blush: 0.6, tear: 0, sparkle: 4, heart: false
                },
                sad: {
                    eyeScaleX: 0.9, eyeScaleY: 1.3, irisSize: 34, irisOffsetX: 0, irisOffsetY: 4,
                    eyebrowAngle: 15, eyebrowY: -8, blush: 0, tear: 0.8, sparkle: 0, heart: false
                },
                love: {
                    eyeScaleX: 0.9, eyeScaleY: 0.6, irisSize: 26, irisOffsetX: 0, irisOffsetY: -3,
                    eyebrowAngle: -20, eyebrowY: -15, blush: 0.8, tear: 0, sparkle: 6, heart: true
                },
                surprised: {
                    eyeScaleX: 1.3, eyeScaleY: 1.4, irisSize: 22, irisOffsetX: 0, irisOffsetY: -2,
                    eyebrowAngle: -25, eyebrowY: -18, blush: 0, tear: 0, sparkle: 2, heart: false
                },
                playful: {
                    eyeScaleX: 1, eyeScaleY: 0.8, irisSize: 30, irisOffsetX: 0, irisOffsetY: -1,
                    eyebrowAngle: -10, eyebrowY: -13, blush: 0.3, tear: 0, sparkle: 3, heart: false
                },
                sleepy: {
                    eyeScaleX: 1.2, eyeScaleY: 0.3, irisSize: 34, irisOffsetX: 0, irisOffsetY: 5,
                    eyebrowAngle: 5, eyebrowY: -10, blush: 0, tear: 0, sparkle: 0, heart: false
                },
                thinking: {
                    eyeScaleX: 0.8, eyeScaleY: 0.9, irisSize: 28, irisOffsetX: 0, irisOffsetY: 0,
                    eyebrowAngle: 10, eyebrowY: -10, blush: 0, tear: 0, sparkle: 1, heart: false
                },
                excited: {
                    eyeScaleX: 1.2, eyeScaleY: 0.5, irisSize: 20, irisOffsetX: 0, irisOffsetY: -4,
                    eyebrowAngle: -30, eyebrowY: -20, blush: 0.5, tear: 0, sparkle: 8, heart: false
                },
                grateful: {
                    eyeScaleX: 1, eyeScaleY: 0.7, irisSize: 28, irisOffsetX: 0, irisOffsetY: -2,
                    eyebrowAngle: -12, eyebrowY: -14, blush: 0.4, tear: 0, sparkle: 5, heart: false
                },
                shy: {
                    eyeScaleX: 0.8, eyeScaleY: 0.9, irisSize: 30, irisOffsetX: 0, irisOffsetY: 0,
                    eyebrowAngle: 5, eyebrowY: -11, blush: 0.7, tear: 0, sparkle: 2, heart: false
                },
                angry: {
                    eyeScaleX: 1, eyeScaleY: 0.6, irisSize: 26, irisOffsetX: 0, irisOffsetY: -1,
                    eyebrowAngle: 20, eyebrowY: -8, blush: 0.2, tear: 0, sparkle: 0, heart: false
                },
                silly: {
                    eyeScaleX: 1.4, eyeScaleY: 0.4, irisSize: 36, irisOffsetX: 0, irisOffsetY: 0,
                    eyebrowAngle: -5, eyebrowY: -12, blush: 0.3, tear: 0, sparkle: 7, heart: false
                }
            };

            // Función para generar variante aleatoria (más de 100 combinaciones)
            function getExpressionVariant(emotion) {
                const base = emotionPresets[emotion] || emotionPresets.neutral;
                const variation = 0.15; // 15% de variación aleatoria
                return {
                    eyeScaleX: base.eyeScaleX * (1 + (Math.random() - 0.5) * variation * 2),
                    eyeScaleY: base.eyeScaleY * (1 + (Math.random() - 0.5) * variation * 2),
                    irisSize: base.irisSize * (1 + (Math.random() - 0.5) * variation * 2),
                    irisOffsetX: base.irisOffsetX + (Math.random() - 0.5) * 6,
                    irisOffsetY: base.irisOffsetY + (Math.random() - 0.5) * 6,
                    eyebrowAngle: base.eyebrowAngle + (Math.random() - 0.5) * 12,
                    eyebrowY: base.eyebrowY + (Math.random() - 0.5) * 6,
                    blush: Math.min(1, Math.max(0, base.blush + (Math.random() - 0.5) * 0.3)),
                    tear: Math.min(1, Math.max(0, base.tear + (Math.random() - 0.5) * 0.3)),
                    sparkle: Math.max(0, Math.floor(base.sparkle + (Math.random() - 0.5) * 4)),
                    heart: base.heart
                };
            }

            // Aplicar expresión a los ojos
            function applyExpression(params) {
                // Ojo izquierdo
                eyeLeft.style.transform = `scale(${params.eyeScaleX}, ${params.eyeScaleY})`;
                eyeRight.style.transform = `scale(${params.eyeScaleX}, ${params.eyeScaleY})`;
                
                // Iris
                irisLeft.style.width = irisLeft.style.height = `${params.irisSize}px`;
                irisRight.style.width = irisRight.style.height = `${params.irisSize}px`;
                irisLeft.style.transform = `translate(${params.irisOffsetX}px, ${params.irisOffsetY}px)`;
                irisRight.style.transform = `translate(${params.irisOffsetX}px, ${params.irisOffsetY}px)`;

                // Cejas
                eyebrowLeft.style.transform = `translateX(-50%) rotate(${params.eyebrowAngle}deg)`;
                eyebrowRight.style.transform = `translateX(-50%) rotate(${-params.eyebrowAngle}deg)`;
                eyebrowLeft.style.top = `${params.eyebrowY}px`;
                eyebrowRight.style.top = `${params.eyebrowY}px`;

                // Rubor (añadimos divs de rubor dinámicos)
                document.querySelectorAll('.blush').forEach(el => el.remove());
                if (params.blush > 0.2) {
                    addBlush(eyeLeft, params.blush);
                    addBlush(eyeRight, params.blush);
                }

                // Lágrimas
                document.querySelectorAll('.tear').forEach(el => el.remove());
                if (params.tear > 0.3) {
                    addTear(eyeLeft);
                    addTear(eyeRight);
                }

                // Corazones flotantes
                if (params.heart) {
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => addParticle('❤️', screen), i * 200);
                    }
                }

                // Destellos (estrellas)
                document.querySelectorAll('.sparkle-star').forEach(el => el.remove());
                for (let i = 0; i < params.sparkle; i++) {
                    setTimeout(() => addSparkle(screen), i * 80);
                }
            }

            function addBlush(eyeElement, alpha) {
                const blush = document.createElement('div');
                blush.className = 'blush';
                blush.style.cssText = `
                    position: absolute;
                    width: 22px;
                    height: 12px;
                    background: rgba(255, 153, 170, ${alpha});
                    border-radius: 50%;
                    bottom: 10px;
                    left: 50%;
                    transform: translateX(-50%);
                    z-index: 5;
                    filter: blur(2px);
                `;
                eyeElement.style.position = 'relative';
                eyeElement.appendChild(blush);
            }

            function addTear(eyeElement) {
                const tear = document.createElement('div');
                tear.className = 'tear';
                tear.style.cssText = `
                    position: absolute;
                    width: 5px;
                    height: 10px;
                    background: #aaddff;
                    border-radius: 0 0 50% 50%;
                    bottom: -5px;
                    left: 50%;
                    transform: translateX(-50%);
                    z-index: 10;
                    animation: fallDown 1.2s forwards;
                `;
                eyeElement.style.position = 'relative';
                eyeElement.appendChild(tear);
                setTimeout(() => tear.remove(), 1200);
            }

            function addParticle(emoji, container) {
                const particle = document.createElement('span');
                particle.className = 'particle';
                particle.textContent = emoji;
                particle.style.left = (30 + Math.random() * 40) + '%';
                particle.style.top = (40 + Math.random() * 20) + '%';
                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1500);
            }

            function addSparkle(container) {
                const sparkle = document.createElement('span');
                sparkle.className = 'sparkle-star';
                sparkle.textContent = '✨';
                sparkle.style.cssText = `
                    position: absolute;
                    left: ${20 + Math.random() * 60}%;
                    top: ${20 + Math.random() * 60}%;
                    font-size: ${10 + Math.random() * 16}px;
                    animation: floatUp 1.5s forwards;
                    pointer-events: none;
                    z-index: 15;
                `;
                container.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1500);
            }

            // Cambiar emoción
            function setEmotion(emotion) {
                currentEmotion = emotion;
                const params = getExpressionVariant(emotion);
                applyExpression(params);
                // Cambiar tema del body
                document.body.className = `theme-${emotion}`;
            }

            // Inicializar con neutral
            setEmotion('neutral');

            // ---------- FUNCIONALIDAD API ----------
            async function sendPrompt() {
                const question = textInput.value.trim();
                if (!question) return;

                // Mostrar mensaje usuario
                appendMessage('Tú', question);
                textInput.value = '';
                setEmotion('thinking');
                speakingIndicator.classList.add('active');

                const prompt = `Eres AIBI, una mascota robot adorable. Responde en español, máximo 2 frases. Devuelve JSON: {"emotion": "happy", "text": "tu respuesta"}. Emociones: happy, sad, love, surprised, playful, sleepy, thinking, excited, grateful, shy, angry, silly. Pregunta: ${question}`;

                try {
                    const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: 'user', parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.9, maxOutputTokens: 80 }
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || 'Error del servidor');

                    const rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = rawText.replace(/```json|```/g, '').trim();
                    const parsed = JSON.parse(cleanJson);

                    appendMessage('AIBI', parsed.text);
                    setEmotion(parsed.emotion || 'happy');
                    speakText(parsed.text);

                } catch (err) {
                    appendMessage('AIBI', '¡Ups! Algo falló en mi cerebro digital 💔');
                    setEmotion('sad');
                    console.error(err);
                } finally {
                    speakingIndicator.classList.remove('active');
                }
            }

            function appendMessage(sender, text) {
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = `<strong>${sender}:</strong> ${text}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            // ---------- VOZ (TTS) ----------
            function speakText(text) {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 1.05;
                utterance.pitch = 1.2;
                const voices = speechSynthesis.getVoices();
                const preferred = voices.find(v => v.lang.startsWith('es') && (v.name.includes('Mónica') || v.name.includes('Paulina') || v.name.toLowerCase().includes('female')));
                if (preferred) utterance.voice = preferred;
                utterance.onstart = () => speakingIndicator.classList.add('active');
                utterance.onend = () => speakingIndicator.classList.remove('active');
                speechSynthesis.speak(utterance);
            }

            // ---------- MICRÓFONO ----------
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                recognition.interimResults = false;
                recognition.continuous = false;

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript.trim();
                    if (transcript) {
                        textInput.value = transcript;
                        sendPrompt();
                    }
                    micBtn.classList.remove('listening');
                };
                recognition.onerror = () => {
                    micBtn.classList.remove('listening');
                    setEmotion('sad');
                };
                recognition.onend = () => micBtn.classList.remove('listening');
            }

            micBtn.addEventListener('click', () => {
                if (!recognition) {
                    alert('Reconocimiento de voz no soportado.');
                    return;
                }
                if (micBtn.classList.contains('listening')) {
                    recognition.stop();
                    micBtn.classList.remove('listening');
                } else {
                    recognition.start();
                    micBtn.classList.add('listening');
                    setEmotion('playful');
                }
            });

            // ---------- CARICIAS (TOUCH) ----------
            let touchStartTime = 0;
            let touchMoved = false;
            screen.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartTime = Date.now();
                touchMoved = false;
            });
            screen.addEventListener('touchmove', (e) => {
                e.preventDefault();
                touchMoved = true;
                if (navigator.vibrate) navigator.vibrate(15);
                if (currentEmotion !== 'love') {
                    setEmotion('love');
                }
            });
            screen.addEventListener('touchend', (e) => {
                e.preventDefault();
                const duration = Date.now() - touchStartTime;
                if (touchMoved && duration > 400) {
                    setEmotion('love');
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    appendMessage('AIBI', '¡Me encantan tus caricias! ❤️');
                    speakText('¡Qué rico! Me gusta cuando me acaricias.');
                } else if (!touchMoved && duration < 300) {
                    setEmotion('playful');
                }
            });

            // Enviar con Enter o botón
            document.getElementById('send-btn').addEventListener('click', sendPrompt);
            textInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendPrompt();
            });

            // Cargar voces
            if (window.speechSynthesis) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
            }

            // Mensaje inicial
            setTimeout(() => {
                appendMessage('AIBI', '¡Hola! Soy AIBI, tu mascota robot. Háblame o acaríciame 🐾');
            }, 500);
        })();
    </script>
</body>
